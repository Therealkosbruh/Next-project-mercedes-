services:
  postgres:
    image: postgres:16-alpine
    container_name: mercedes_db
    restart: always
    environment:
      POSTGRES_DB: mercedes
      POSTGRES_USER: mercedes_user
      POSTGRES_PASSWORD: local_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercedes_user -d mercedes"]
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    build: ./back
    container_name: mercedes_back
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: mercedes_user
      DB_PASSWORD: local_password
      DB_NAME: mercedes
    ports:
      - "3001:3001"

  front:
    build:
      context: ./front
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    container_name: mercedes_front
    restart: always
    depends_on:
      - back
    ports:
      - "3000:3000"

volumes:
  postgres_data:
